<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber of Commerce Header</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8fafc;
        }

        .chamber-header {
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-bottom: 3px solid #D4AF37;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-svg {
            width: 80px;
            height: 80px;
        }

        .brand-text h1 {
            color: #0f2c59;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .brand-text p {
            color: #D4AF37;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 3px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-link {
            text-decoration: none;
            color: #334155;
            font-weight: 600;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: #0f2c59;
        }

        .cta-btn {
            background-color: #0f2c59;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .cta-btn:hover {
            background-color: #1e40af;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .chamber-header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .nav-menu {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header class="chamber-header">
        <!-- Logo & Brand -->
        <a href="#" class="logo-container">
            <!-- Inline SVG Logo -->
            <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#F3A13B" />
                        <stop offset="100%" stop-color="#D4AF37" />
                    </linearGradient>
                </defs>
                <circle cx="250" cy="250" r="230" fill="none" stroke="#0f2c59" stroke-width="12"/>
                <circle cx="250" cy="250" r="210" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-dasharray="8,8"/>
                <path d="M 120 250 A 130 130 0 0 0 380 250" fill="none" stroke="#e0e6ed" stroke-width="3"/>
                <path d="M 250 120 A 130 130 0 0 0 250 380" fill="none" stroke="#e0e6ed" stroke-width="3"/>
                <polygon points="160,210 250,150 340,210" fill="#0f2c59" />
                <rect x="170" y="215" width="160" height="15" fill="url(#goldGrad)" rx="2"/>
                <rect x="185" y="235" width="18" height="65" fill="#0f2c59" rx="1"/>
                <rect x="217" y="235" width="18" height="65" fill="#0f2c59" rx="1"/>
                <rect x="249" y="235" width="18" height="65" fill="#0f2c59" rx="1"/>
                <rect x="281" y="235" width="18" height="65" fill="#0f2c59" rx="1"/>
                <rect x="165" y="305" width="170" height="15" fill="#0f2c59" rx="2"/>
                <rect x="155" y="325" width="190" height="12" fill="url(#goldGrad)" rx="2"/>
            </svg>
            <div class="brand-text">
                <h1>METRO</h1>
                <p>CHAMBER OF COMMERCE</p>
            </div>
        </a>

        <!-- Navigation Options -->
        <nav>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">Memberships</a></li>
                <li><a href="#" class="nav-link">Events</a></li>
                <li><a href="#" class="nav-link">Advocacy</a></li>
                <li><a href="#" class="nav-link cta-btn">Join Us</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
